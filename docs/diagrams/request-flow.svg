<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 920 800" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0066cc"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#00cc00"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9900"/>
    </marker>
    <marker id="arrowDashedGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#00aa00"/>
    </marker>
    <marker id="arrowDashedBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0055aa"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="920" height="800" fill="white"/>

  <!-- PARTICIPANTS HEADER -->
  <!-- Left: User / Client -->
  <g>
    <rect x="30" y="10" width="200" height="60" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="130" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000000">User / Client</text>
    <text x="130" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" text-anchor="middle" fill="#333333">create_agent.py</text>
  </g>

  <!-- Center: Foundry Agent -->
  <g>
    <rect x="360" y="10" width="200" height="60" fill="#fff2cc" stroke="#d6b656" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="460" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000000">Foundry Agent</text>
    <text x="460" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" text-anchor="middle" fill="#333333">GPT-5-mini</text>
  </g>

  <!-- Right: MCP Server -->
  <g>
    <rect x="690" y="10" width="200" height="60" fill="#d5e8d4" stroke="#82b366" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="790" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000000">MCP Server</text>
    <text x="790" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" text-anchor="middle" fill="#333333">Azure Functions</text>
  </g>

  <!-- LIFELINES (dashed vertical lines) -->
  <line x1="130" y1="70" x2="130" y2="750" stroke="#0066cc" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="460" y1="70" x2="460" y2="750" stroke="#d6b656" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="790" y1="70" x2="790" y2="750" stroke="#82b366" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- STEP 1: User to Agent -->
  <g>
    <!-- Step number circle -->
    <circle cx="75" cy="120" r="18" fill="#0066cc" stroke="#0066cc" stroke-width="2"/>
    <text x="75" y="127" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">1</text>

    <!-- Arrow -->
    <line x1="130" y1="120" x2="460" y2="120" stroke="#0066cc" stroke-width="2" marker-end="url(#arrowBlue)"/>

    <!-- Message label -->
    <text x="295" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#0066cc">"Compare Lewandowski and Mbappé"</text>
    <text x="295" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" text-anchor="middle" fill="#666666">conversations.create() + responses.create()</text>

    <!-- Timing -->
    <text x="840" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#999999">~100ms</text>
  </g>

  <!-- STEP 2: Agent self-reasoning box -->
  <g>
    <!-- Step number circle -->
    <circle cx="380" cy="170" r="18" fill="#ff9900" stroke="#ff9900" stroke-width="2"/>
    <text x="380" y="177" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">2</text>

    <!-- Self-call box -->
    <rect x="380" y="195" width="160" height="70" fill="#fff8e1" stroke="#d6b656" stroke-width="2" rx="4" filter="url(#shadow)"/>
    <text x="460" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" text-anchor="middle" fill="#333333" font-weight="bold">GPT-5-mini reasons:</text>
    <text x="460" y="235" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" text-anchor="middle" fill="#333333">I need to call compare_players</text>
    <text x="460" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" text-anchor="middle" fill="#333333">with player1=lewandowski,</text>
    <text x="460" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" text-anchor="middle" fill="#333333">player2=mbappe</text>
  </g>

  <!-- STEP 3: Agent to MCP -->
  <g>
    <!-- Step number circle -->
    <circle cx="560" cy="300" r="18" fill="#00cc00" stroke="#00cc00" stroke-width="2"/>
    <text x="560" y="307" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">3</text>

    <!-- Arrow -->
    <line x1="460" y1="300" x2="790" y2="300" stroke="#00cc00" stroke-width="2" marker-end="url(#arrowGreen)"/>

    <!-- Message label -->
    <text x="625" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#00cc00">MCP tool_call: compare_players</text>
    <text x="625" y="297" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" text-anchor="middle" fill="#00cc00">{player1: lewandowski, player2: mbappe}</text>

    <!-- Security badge -->
    <rect x="600" y="310" width="120" height="25" fill="#ffe6e6" stroke="#cc0000" stroke-width="1" rx="3"/>
    <text x="660" y="328" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" text-anchor="middle" fill="#cc0000">🔐 x-functions-key header</text>

    <!-- Timing -->
    <text x="840" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#999999">~200ms</text>
  </g>

  <!-- STEP 4: MCP self-execution box -->
  <g>
    <!-- Step number circle -->
    <circle cx="670" cy="370" r="18" fill="#00cc00" stroke="#00cc00" stroke-width="2"/>
    <text x="670" y="377" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">4</text>

    <!-- Self-call box -->
    <rect x="640" y="395" width="300" height="85" fill="#e8f5e9" stroke="#82b366" stroke-width="2" rx="4" filter="url(#shadow)"/>
    <text x="790" y="415" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" text-anchor="middle" fill="#333333" font-weight="bold">Azure Function executes:</text>
    <text x="790" y="435" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" text-anchor="middle" fill="#333333">Look up both players,</text>
    <text x="790" y="452" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" text-anchor="middle" fill="#333333">Compute stat differences,</text>
    <text x="790" y="469" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" text-anchor="middle" fill="#333333">Return JSON comparison</text>
  </g>

  <!-- STEP 5: MCP to Agent (dashed return) -->
  <g>
    <!-- Step number circle -->
    <circle cx="560" cy="520" r="18" fill="#00cc00" stroke="#00cc00" stroke-width="2"/>
    <text x="560" y="527" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">5</text>

    <!-- Dashed arrow -->
    <line x1="790" y1="520" x2="460" y2="520" stroke="#00aa00" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowDashedGreen)"/>

    <!-- Message label -->
    <text x="625" y="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#00cc00">Tool result:</text>
    <text x="625" y="518" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" text-anchor="middle" fill="#00cc00">{player1: {goals: 26, ...}, player2: {goals: 23, ...}, diff: {...}}</text>

    <!-- Timing -->
    <text x="840" y="520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#999999">~50ms</text>
  </g>

  <!-- STEP 6: Agent self-synthesis box -->
  <g>
    <!-- Step number circle -->
    <circle cx="380" cy="580" r="18" fill="#ff9900" stroke="#ff9900" stroke-width="2"/>
    <text x="380" y="587" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">6</text>

    <!-- Self-call box -->
    <rect x="320" y="605" width="280" height="70" fill="#fff8e1" stroke="#d6b656" stroke-width="2" rx="4" filter="url(#shadow)"/>
    <text x="460" y="625" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" text-anchor="middle" fill="#333333" font-weight="bold">GPT-5-mini synthesizes:</text>
    <text x="460" y="645" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" text-anchor="middle" fill="#333333">Formats comparison in natural language</text>
    <text x="460" y="662" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" text-anchor="middle" fill="#333333">with analysis</text>
  </g>

  <!-- STEP 7: Agent to User (dashed return) -->
  <g>
    <!-- Step number circle -->
    <circle cx="220" cy="720" r="18" fill="#0055aa" stroke="#0055aa" stroke-width="2"/>
    <text x="220" y="727" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">7</text>

    <!-- Dashed arrow -->
    <line x1="460" y1="720" x2="130" y2="720" stroke="#0055aa" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowDashedBlue)"/>

    <!-- Message label -->
    <text x="295" y="705" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#0055aa">Natural language response</text>
  </g>

  <!-- RESPONSE PREVIEW BOX -->
  <g>
    <rect x="50" y="510" width="320" height="90" fill="#e8f4fd" stroke="#0078d4" stroke-width="2" rx="6" filter="url(#shadow)"/>
    <text x="210" y="535" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#000000">Response Preview</text>
    <text x="60" y="558" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#333333">🤖 Lewandowski leads in goals</text>
    <text x="60" y="573" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#333333">(26 vs 23) while Mbappé edges ahead</text>
    <text x="60" y="588" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#333333">in assists (10 vs 5). Lewandowski has</text>
  </g>

  <!-- BOTTOM NOTE -->
  <g>
    <rect x="50" y="760" width="850" height="30" fill="#f5f5f5" stroke="#cccccc" stroke-width="1" rx="4"/>
    <text x="60" y="780" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#333333">💡 The agent autonomously decides which MCP tools to call based on the user's question. For simple queries like 'search Polish players', it calls search_players instead.</text>
  </g>
</svg>
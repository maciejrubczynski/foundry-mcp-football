<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0066cc"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#00cc00"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#cc0000"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="1100" height="620" fill="white"/>

  <!-- LEFT GROUP: CLIENT -->
  <g>
    <!-- Dashed border -->
    <rect x="30" y="20" width="240" height="280" fill="#f5f5f5" stroke="#999999" stroke-width="2" stroke-dasharray="5,5" rx="6"/>

    <!-- Title -->
    <text x="150" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333333">Client</text>

    <!-- Python Script Box -->
    <rect x="50" y="75" width="200" height="70" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2" rx="4" filter="url(#shadow)"/>
    <text x="150" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#000000">Python Script</text>
    <text x="150" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" text-anchor="middle" fill="#333333">create_agent.py</text>

    <!-- Arrow down -->
    <line x1="150" y1="145" x2="150" y2="170" stroke="#333333" stroke-width="2" marker-end="url(#arrowBlue)"/>

    <!-- SDK Box -->
    <rect x="50" y="170" width="200" height="70" fill="#e1d5e7" stroke="#9673a6" stroke-width="2" rx="4" filter="url(#shadow)"/>
    <text x="150" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#000000">azure-ai-projects SDK</text>
    <text x="150" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" text-anchor="middle" fill="#333333">v2</text>
  </g>

  <!-- MIDDLE GROUP: MICROSOFT FOUNDRY -->
  <g>
    <!-- Yellow border -->
    <rect x="350" y="20" width="310" height="490" fill="#fff2cc" stroke="#d6b656" stroke-width="2" rx="6"/>

    <!-- Title -->
    <text x="505" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333333">Microsoft Foundry</text>

    <!-- Foundry Agent Box -->
    <rect x="370" y="75" width="270" height="75" fill="#fff2cc" stroke="#d6b656" stroke-width="2" rx="4" filter="url(#shadow)"/>
    <text x="505" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#000000">Foundry Agent</text>
    <text x="505" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" text-anchor="middle" fill="#333333">football-scout-agent</text>

    <!-- Arrow down -->
    <line x1="505" y1="150" x2="505" y2="175" stroke="#333333" stroke-width="2" marker-end="url(#arrowBlue)"/>

    <!-- GPT-5-mini Box -->
    <rect x="370" y="175" width="270" height="75" fill="#f8cecc" stroke="#b85450" stroke-width="2" rx="4" filter="url(#shadow)"/>
    <text x="505" y="205" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#000000">GPT-5-mini</text>
    <text x="505" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" text-anchor="middle" fill="#333333">LLM Reasoning</text>

    <!-- Bidirectional arrows between Agent and GPT -->
    <path d="M 395 150 Q 380 162 395 175" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
    <path d="M 615 175 Q 630 162 615 150" stroke="#333333" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

    <!-- Arrow down -->
    <line x1="505" y1="250" x2="505" y2="275" stroke="#333333" stroke-width="2" marker-end="url(#arrowBlue)"/>

    <!-- Conversations API Box -->
    <rect x="370" y="275" width="270" height="60" fill="#fff2cc" stroke="#d6b656" stroke-width="2" rx="4"/>
    <text x="505" y="305" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000000">Conversations API +</text>
    <text x="505" y="325" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000000">Responses API</text>
  </g>

  <!-- RIGHT GROUP: AZURE FUNCTIONS MCP SERVER -->
  <g>
    <!-- Green border -->
    <rect x="740" y="20" width="330" height="490" fill="#d5e8d4" stroke="#82b366" stroke-width="2" rx="6"/>

    <!-- Title -->
    <text x="905" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333333">Azure Functions MCP</text>

    <!-- Subheading -->
    <text x="905" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" text-anchor="middle" fill="#666666">/runtime/webhooks/mcp Streamable HTTP</text>

    <!-- Tool 1: search_players -->
    <rect x="760" y="85" width="290" height="60" fill="#d5e8d4" stroke="#82b366" stroke-width="2" rx="4" filter="url(#shadow)"/>
    <text x="905" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000000">search_players</text>
    <text x="905" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" text-anchor="middle" fill="#333333">Search by name, nationality, position, or club</text>

    <!-- Tool 2: get_player_stats -->
    <rect x="760" y="160" width="290" height="60" fill="#d5e8d4" stroke="#82b366" stroke-width="2" rx="4" filter="url(#shadow)"/>
    <text x="905" y="185" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000000">get_player_stats</text>
    <text x="905" y="205" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" text-anchor="middle" fill="#333333">Season &amp; career stats for a single player</text>

    <!-- Tool 3: compare_players -->
    <rect x="760" y="235" width="290" height="60" fill="#d5e8d4" stroke="#82b366" stroke-width="2" rx="4" filter="url(#shadow)"/>
    <text x="905" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000000">compare_players</text>
    <text x="905" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" text-anchor="middle" fill="#333333">Side-by-side comparison of two players</text>

    <!-- Arrow down -->
    <line x1="905" y1="295" x2="905" y2="320" stroke="#333333" stroke-width="2" marker-end="url(#arrowGreen)"/>

    <!-- In-Memory DB (cylinder) -->
    <g>
      <ellipse cx="905" cy="325" rx="80" ry="15" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
      <rect x="825" y="325" width="160" height="65" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
      <ellipse cx="905" cy="390" rx="80" ry="15" fill="#82b366" stroke="#82b366" stroke-width="2"/>
      <text x="905" y="335" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000000">In-Memory DB</text>
      <text x="905" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" text-anchor="middle" fill="#333333">8 players: Lewandowski,</text>
      <text x="905" y="375" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" text-anchor="middle" fill="#333333">Haaland, Mbappé...</text>
    </g>
  </g>

  <!-- CONNECTING ARROWS -->
  <!-- Client to Foundry (blue) -->
  <line x1="270" y1="165" x2="350" y2="165" stroke="#0066cc" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text x="310" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" text-anchor="middle" fill="#0066cc" font-weight="bold">REST API (HTTPS)</text>

  <!-- Foundry to MCP Server (green) -->
  <line x1="660" y1="270" x2="740" y2="270" stroke="#00cc00" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <text x="700" y="255" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" text-anchor="middle" fill="#00cc00" font-weight="bold">MCP Protocol</text>
  <text x="700" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" text-anchor="middle" fill="#00cc00" font-weight="bold">(Streamable HTTP)</text>

  <!-- Security badge -->
  <g>
    <rect x="640" y="305" width="120" height="40" fill="#ffe6e6" stroke="#cc0000" stroke-width="2" rx="4"/>
    <text x="700" y="322" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" text-anchor="middle" fill="#cc0000">🔐 x-functions-key</text>
  </g>

  <!-- LEGEND -->
  <g>
    <text x="50" y="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="bold" fill="#333333">Legend:</text>

    <!-- Client Code -->
    <rect x="50" y="570" width="20" height="20" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1" rx="2"/>
    <text x="80" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#333333">Client Code</text>

    <!-- Foundry Service -->
    <rect x="280" y="570" width="20" height="20" fill="#fff2cc" stroke="#d6b656" stroke-width="1" rx="2"/>
    <text x="310" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#333333">Foundry Service</text>

    <!-- LLM Model -->
    <rect x="540" y="570" width="20" height="20" fill="#f8cecc" stroke="#b85450" stroke-width="1" rx="2"/>
    <text x="570" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#333333">LLM Model</text>

    <!-- MCP Server/Tools -->
    <rect x="800" y="570" width="20" height="20" fill="#d5e8d4" stroke="#82b366" stroke-width="1" rx="2"/>
    <text x="830" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" fill="#333333">MCP Server/Tools</text>
  </g>
</svg>